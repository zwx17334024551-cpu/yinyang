<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杨原五骨经筋·智能问诊台</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-jade: #1A2421;
            --bg-dark: #0D1110;
            --text-light: #E8EBE9;
            --text-dim: #A0AAB2;
            --glass-bg: rgba(26, 36, 33, 0.6);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Noto Serif SC", "Songti SC", serif; /* 衬线字体凸显中式高级感 */
            background: linear-gradient(135deg, var(--bg-dark), var(--dark-jade));
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05), transparent 25%);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            padding: 40px 0;
        }

        /* 玻璃拟物化卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
        }

        h1, h2, h3 {
            color: var(--primary-gold);
            font-weight: normal;
            letter-spacing: 2px;
            margin-top: 0;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 1px;
        }

        select, input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #A67C00, #D4AF37);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        /* 诊断结果区域 */
        #result-area {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }

        .result-section {
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--primary-gold);
        }

        .result-section h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .result-section p, .result-section ul {
            font-size: 15px;
            line-height: 1.8;
            margin: 0;
            color: #D1D8D5;
        }
        
        .result-section li {
            margin-bottom: 6px;
        }

        .tag {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin-right: 8px;
            margin-bottom: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 问诊输入区 -->
    <div class="glass-card">
        <h1>五骨经筋·智能问诊台</h1>
        
        <div class="form-group">
            <label>▶ 主诉部位 (核心病症)</label>
            <select id="symptom">
                <option value="waist">腰部剧痛 / 起坐困难 (腰脊痛)</option>
                <option value="shoulder">肩部疼痛 / 手臂受限 (肩周炎)</option>
                <option value="head">慢性头痛 / 眩晕 / 失眠</option>
                <option value="knee">膝关节痛 / 腿部发沉 / 脚踝崴伤</option>
                <option value="heart">心悸胸闷 / 气短 / 心绞痛</option>
                <option value="sciatica">坐骨神经痛 / 臀部寒凉</option>
            </select>
        </div>

        <div class="form-group">
            <label>▶ 触诊筋脉手感 (五骨取点)</label>
            <select id="palpation">
                <option value="hard">僵硬板结 (瘀堵/劳损)</option>
                <option value="sticky">绵软隆起/胶质状 (毒火伤筋)</option>
                <option value="empty">空虚塌陷 (气血不足)</option>
                <option value="fine">触摸到如头发丝细筋 (毫筋发炎)</option>
            </select>
        </div>

        <div class="form-group">
            <label>▶ 患者精神情志状态 (心像)</label>
            <select id="emotion">
                <option value="normal">相对平稳</option>
                <option value="fear">曾受惊吓 / 神经紧绷 / 胆小多疑</option>
                <option value="anger">强势不服输 / 易怒 / 爱生闷气</option>
                <option value="depressed">郁郁寡欢 / 思虑过度 / 孤僻</option>
            </select>
        </div>

        <div class="form-group">
            <label>▶ 饮食与作息规律</label>
            <select id="lifestyle">
                <option value="bad">暴饮暴食 / 熬夜 / 久坐不动</option>
                <option value="good">作息规律 / 饮食节制</option>
            </select>
        </div>

        <button onclick="generatePlan()">生成专属外经调理方案</button>
    </div>

    <!-- 方案输出区 -->
    <div class="glass-card" id="result-area">
        <h2>辩证施治结果</h2>
        <div id="tags"></div>

        <div class="result-section">
            <h3>一、 寻筋溯源 (病因剖析)</h3>
            <p id="res-cause"></p>
        </div>

        <div class="result-section">
            <h3>二、 五骨触诊定点 (经脉走向)</h3>
            <ul id="res-palpation"></ul>
        </div>

        <div class="result-section">
            <h3>三、 揉术理疗方案 (手法)</h3>
            <p id="res-technique"></p>
        </div>

        <div class="result-section">
            <h3>四、 心法与引导 (话聊疏导)</h3>
            <p id="res-mindset"></p>
        </div>

        <div class="result-section">
            <h3>五、 功法与保养 (导引自愈)</h3>
            <p id="res-exercise"></p>
        </div>
    </div>
</div>

<script>
    // 核心逻辑库（基于杨原五骨经筋理论）
    const db = {
        symptoms: {
            waist: {
                name: "腰病",
                cause_hard: "多为气口瘀堵，导致中气不足，气血循环不畅，骨骼缺少营养引发的无菌性发炎。腰为肾之府，此为虚实寒热伤及壮脉与关脉。",
                cause_fine: "典型的【椎间隙毫筋伤腰】。病变不在大筋，而在椎体横断面边缘细如发丝的神经常年炎变。",
                palpation:["重点查4、5椎腰底气口（脉门之窍）", "查八髎外骨边肠经结节", "摸骶髂骨正中上下隆起处（腰眼/关脉）"],
                technique: "重手法：揉开八髎外围肠筋结，疏通气口。若为毫筋，用轻拨法，拨至手感触摸不到细筋为止。切忌：病筋若潜伏极深（能跑能跳者），不可轻易深挖以免引发剧痛。"
            },
            shoulder: {
                name: "肩臂症",
                cause_sticky: "此为【假性肩周炎】！病根不在肩，而在胸肌、锁骨窝气伤，或腋下淋巴毒火伤筋（胶质状）。",
                cause_hard: "真性肩周炎。肩关关节周围、三角肌缝隙出现僵硬粘连，骨膜与筋膜增厚。",
                palpation:["先查胸前胸肌、锁骨窝", "次查腋下淋巴有无肿大结块", "再查肩胛骨、三角肌的骨边、骨角"],
                technique: "基础手：【勾、挂、刮、拨】。先从受损筋外围边缘疏通（避开最痛点），逐步往里挪。掏进骨与肉结合部，剥离粘连骨膜。假性肩周炎需先开胸顺气、捋腋下。"
            },
            head: {
                name: "头疾眩晕",
                cause_general: "多因长期低头、作息紊乱致颈项肌肉僵硬，挤压血管。或是胃肠失和、肝火上冲导致的脑神经紧张。",
                palpation:["摸左头两侧（人字脉/界隔脉）", "摸颈项区藏五经（左脾胃、右肝胆、中通心）", "查枕骨边缘之后区（内腧、外腧）"],
                technique: "松解头顶部垄脊脉以缓神。刮拨颈项区骨缝，舒展筋结，引气下行。用手指的敏感度直观探查条索状筋结。"
            },
            knee: {
                name: "膝部退变",
                cause_general: "主因在肝脾，养不润筋。属【营脉】范畴。营脉受阻，气血流速减缓，膝内生渣子，软骨磨损。",
                palpation:["摸髌骨上端三横指（上突）", "摸髌骨两侧缝隙（内/外夹蹊）", "查大腿根部股骨筋与髋骨结合处"],
                technique: "治膝需治髋！必须先向上追踪到髋关节营脉。用点、线、面手法疏通股骨筋前后两筋，再去拨膝盖骨缝里的毫筋。"
            },
            heart: {
                name: "心肺气郁",
                cause_general: "中气虚弱，脾胃不运。冲脉（沉积脉）左侧若堵塞，极易压迫心脏造成心慌气短。剑突旁常有‘气冲伤’鼓包。",
                palpation:["触摸两肋剑突下（气冲伤）", "摸左手心筋（查是否有杂乱小筋结）", "摸颈左肺大筋"],
                technique: "严禁急攻！必须循序渐进。先从腕部三条筋轻柔开始，理顺胸腔闲散之气。运用“挂”字诀飘手轻拨，半月后方可向内深攻。"
            },
            sciatica: {
                name: "坐骨神经痛",
                cause_general: "肾元之气亏损。股沟脉（管理生殖/泌尿系统）发生瘀堵或炎热，导致臀部寒凉，牵连髋骨上缘疼痛。",
                palpation:["摸大腿根部与腹部连接处（股沟脉）", "查下腰眼及内外眼线", "查坐骨结节边缘"],
                technique: "顺股沟脉走向拔筋，揉化腰骶带脉筋结。通过疏通外脉，引动内气，改善下焦循环。"
            }
        },
        emotions: {
            fear: "【心法引导】：胆主神，惊吓伤胆导致神经防护系统紊乱（提心吊胆）。治疗时需用强大的“气势”压住病邪。话聊直击痛点：“想活还是想死？”以此激发患者求生士气，破除恐惧幻觉。",
            anger: "【心法引导】：“气生百病”。怒气导致体内脱轨之气（邪气）窜筋穿骨。话聊要让患者学会“认错”，放下争强好胜的执念，化解胸中郁结，否则手法疗效大打折扣。",
            depressed: "【心法引导】：思虑过度导致胃肠痉挛、冲脉虚胀。需用正能量磁场（导引术）同频共振。教导患者“看淡得失，仰视天阔”，唤醒其沉睡的朝气。",
            normal: "【心法引导】：患者配合度高。沟通时多用通俗的“大白话”，不讲深奥术语。七分心三分手，将医者的“正念”贯注于指尖即可。"
        },
        lifestyles: {
            bad: "【生活处方】：细嚼慢咽七分饱，晚饭三成胃肠好；必须纠正熬夜刷手机耗神伤胆的恶习。日出而作，日落而息，顺应天地阴阳之规。",
            good: "【生活处方】：继续保持良好作息。五谷水土皆为地生之物，内含气场。可辅以修心之法，静坐常思己过，进一步提升免疫力。"
        }
    };

    function generatePlan() {
        const sym = document.getElementById("symptom").value;
        const pal = document.getElementById("palpation").value;
        const emo = document.getElementById("emotion").value;
        const life = document.getElementById("lifestyle").value;

        const resArea = document.getElementById("result-area");
        resArea.style.display = "block";
        resArea.style.animation = "none";
        setTimeout(() => resArea.style.animation = "fadeIn 0.8s ease forwards", 10);

        // 组装标签
        let tagsHtml = `<span class="tag">外经理疗</span> <span class="tag">三分手七分心</span>`;
        if(sym === "waist") tagsHtml += `<span class="tag">胃肠同调</span>`;
        if(pal === "sticky") tagsHtml += `<span class="tag">排毒清火</span>`;
        if(emo === "fear") tagsHtml += `<span class="tag">安神定志</span>`;
        document.getElementById("tags").innerHTML = tagsHtml;

        // 组装病因
        let cause = db.symptoms[sym].cause_general;
        if(pal === "hard" && db.symptoms[sym].cause_hard) cause = db.symptoms[sym].cause_hard;
        if(pal === "sticky" && db.symptoms[sym].cause_sticky) cause = db.symptoms[sym].cause_sticky;
        if(pal === "fine" && db.symptoms[sym].cause_fine) cause = db.symptoms[sym].cause_fine;
        
        if(sym === "waist" && (pal==="hard" || pal==="sticky")){
            cause += " 核心判断：【胃肠伤腰】——肠胃是中气之源，胃肠弱则气口堵塞，下沉牵扯引发剧烈腰痛。";
        }
        document.getElementById("res-cause").innerText = cause;

        // 组装触诊点
        let palList = "";
        db.symptoms[sym].palpation.forEach(p => {
            palList += `<li>🎯 ${p}</li>`;
        });
        palList += `<li>🔍 寻五骨秘要：沿着骨边、骨角、骨凸、骨凹、骨缝寻找结节。</li>`;
        document.getElementById("res-palpation").innerHTML = palList;

        // 组装手法
        let tech = `【核心技法】：粘、揉、挤、靠、刮、拨、抖。<br><br>${db.symptoms[sym].technique}<br><br>【要领】：沉肩坠肘耷拉腕，出手如钩，回手如挂。力求平行渗透，绝不可用蛮力死压，需做到“筋归槽，脉归位”。`;
        document.getElementById("res-technique").innerHTML = tech;

        // 组装心法
        document.getElementById("res-mindset").innerText = db.emotions[emo];

        // 组装功法
        let exercises = db.lifestyles[life] + "<br><br>【推荐配套功法】：<br>";
        if(sym === "waist" || sym === "sciatica") {
            exercises += "👉 <strong>托底功 (六式)</strong>：重点练习‘捋股沟’与‘通气口’，固护底气。<br>";
            exercises += "👉 <strong>脊柱操</strong>：拉伸督脉与壮脉。";
        } else if (sym === "heart" || sym === "shoulder") {
            exercises += "👉 <strong>强心肺操 (十二式)</strong>：多做‘开心锁’、‘捋腋下’、‘推两肋’，打开胸腔气结。";
        } else {
            exercises += "👉 <strong>翡翠汤养生</strong>：早晨空腹饮用清水砂锅煮白菜汤，润肺清肠，排毒化结。";
        }
        document.getElementById("res-exercise").innerHTML = exercises;
    }
</script>

</body>
</html>
